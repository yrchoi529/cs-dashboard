<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Agent Performance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar { width: 260px; min-width: 260px; background: #1a2744; color: #fff; display: flex; flex-direction: column; overflow: hidden; }
#sidebar-header { padding: 18px 16px 12px; border-bottom: 1px solid #2d3f6b; }
#sidebar-header h2 { font-size: 15px; font-weight: 700; }
#sidebar-header p  { font-size: 11px; color: #8898bb; margin-top: 2px; }

.upload-section { padding: 14px 16px; border-bottom: 1px solid #2d3f6b; }
.upload-section label { font-size: 11px; font-weight: 600; color: #8898bb; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 8px; }
.upload-btn { width: 100%; padding: 9px; background: #2d4a8a; color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; transition: .15s; }
.upload-btn:hover { background: #3a5aa8; }
#csvInput { display: none; }
#uploadStatus { font-size: 11px; margin-top: 6px; min-height: 16px; color: #6ee7b7; }

.agents-section { padding: 14px 16px 8px; flex: 1; overflow-y: auto; }
.agents-section > label { font-size: 11px; font-weight: 600; color: #8898bb; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 8px; }
#agentSearch { width: 100%; padding: 7px 10px; background: #243257; border: 1px solid #3a4f7a; border-radius: 6px; color: #fff; font-size: 13px; margin-bottom: 10px; }
#agentSearch::placeholder { color: #5d718f; }
#agentSearch:focus { outline: none; border-color: #4a7adb; }
.agent-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: .12s; }
.agent-item:hover { background: #243257; }
.agent-item.active { background: #2d6be4; }
.agent-avatar { width: 32px; height: 32px; border-radius: 50%; background: #3a5aa8; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.agent-item.active .agent-avatar { background: rgba(255,255,255,.25); }
.agent-name { font-size: 13px; font-weight: 500; flex: 1; }
.del-btn { opacity: 0.35; font-size: 13px; cursor: pointer; padding: 2px 5px; border-radius: 4px; transition: .12s; }
.del-btn:hover { opacity: 1; background: rgba(220,38,38,.2); }

.months-section { padding: 12px 16px 16px; border-top: 1px solid #2d3f6b; }
.months-section > label { font-size: 11px; font-weight: 600; color: #8898bb; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 4px; }
.months-hint { font-size: 10px; color: #5d718f; margin-bottom: 10px; }
#monthsList { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
.month-row { display: flex; align-items: center; gap: 6px; }
.month-chip { flex: 1; padding: 7px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; background: #243257; color: #8898bb; transition: .15s; text-align: center; }
.month-chip:hover { background: #2d3f6b; color: #fff; }
.month-chip.sel-0 { background: #2d6be4; color: #fff; }
.month-chip.sel-1 { background: #059669; color: #fff; }
.month-chip.sel-2 { background: #d97706; color: #fff; }

/* ── MAIN ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
#topbar h1 { font-size: 18px; font-weight: 700; color: #1a2744; }
#topbarMeta { display: flex; align-items: center; gap: 10px; }
#topbarLabel { background: #f0f4f8; border-radius: 20px; padding: 5px 14px; font-size: 12px; color: #4a5568; font-weight: 500; }
#refreshBtn { background: #2d6be4; color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
#refreshBtn:hover { background: #1d5bd4; }

#content { flex: 1; overflow-y: auto; padding: 20px 24px; }

#emptyState { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #a0aec0; }
#emptyState .icon { font-size: 48px; margin-bottom: 16px; }
#emptyState h3 { font-size: 18px; color: #4a5568; margin-bottom: 8px; }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: #fff; border-radius: 10px; padding: 14px 16px; border-left: 4px solid #2d6be4; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.kpi-label { font-size: 11px; color: #718096; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 700; color: #1a2744; line-height: 1; }
.kpi-unit  { font-size: 11px; color: #718096; margin-top: 3px; }
.kpi-card.blue   { border-left-color:#2d6be4; } .kpi-card.blue .kpi-value   { color:#2d6be4; }
.kpi-card.green  { border-left-color:#059669; } .kpi-card.green .kpi-value  { color:#059669; }
.kpi-card.amber  { border-left-color:#d97706; } .kpi-card.amber .kpi-value  { color:#d97706; }
.kpi-card.red    { border-left-color:#dc2626; } .kpi-card.red .kpi-value    { color:#dc2626; }
.kpi-card.purple { border-left-color:#7c3aed; } .kpi-card.purple .kpi-value { color:#7c3aed; }
.kpi-card.teal   { border-left-color:#0f766e; } .kpi-card.teal .kpi-value   { color:#0f766e; }
.kpi-card.pink   { border-left-color:#be185d; } .kpi-card.pink .kpi-value   { color:#be185d; }
.kpi-card.orange { border-left-color:#c2410c; } .kpi-card.orange .kpi-value { color:#c2410c; }

.section-title { font-size: 14px; font-weight: 700; color: #1a2744; margin-bottom: 12px; padding-left: 8px; border-left: 3px solid #2d6be4; }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.chart-card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.chart-card h4 { font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 12px; }
.chart-card canvas { max-height: 200px; }
.table-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.table-card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
.table-card h4 { font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #f7f9fc; padding: 7px 10px; text-align: left; font-weight: 600; color: #718096; font-size: 11px; text-transform: uppercase; }
td { padding: 8px 10px; border-bottom: 1px solid #f0f4f8; color: #2d3748; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f7f9fc; }
.rank-num { font-weight: 700; color: #2d6be4; }
.good { color: #059669; font-weight: 700; }
.warn { color: #dc2626; font-weight: 700; }

.yearly-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.yearly-table th { background: #1a2744; color: #fff; padding: 7px 8px; text-align: center; }
.yearly-table th:first-child { text-align: left; }
.yearly-table td { padding: 7px 8px; border-bottom: 1px solid #f0f4f8; text-align: center; }
.yearly-table td:first-child { text-align: left; font-weight: 600; }
.yearly-table tr:nth-child(even) td { background: #f7f9fc; }
.yearly-table .avg-row td { background: #1a2744; color: #fff; font-weight: 700; }

.comp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.comp-table th { background: #1a2744; color: #fff; padding: 8px 10px; font-size: 11px; text-align: center; }
.comp-table th:first-child { text-align: left; }
.comp-table td { padding: 8px 10px; border-bottom: 1px solid #f0f4f8; }
.comp-table td:first-child { font-weight: 600; color: #2d3748; }
.comp-table tr:nth-child(even) td { background: #f7f9fc; }
.delta-up   { color: #059669; font-weight: 700; }
.delta-down { color: #dc2626; font-weight: 700; }
.delta-same { color: #718096; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: #c4cfe0; border-radius: 3px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <h2>📊 CS Performance</h2>
    <p>Agent Dashboard</p>
  </div>

  <div class="upload-section">
    <label>CSV Upload</label>
    <button class="upload-btn" onclick="document.getElementById('csvInput').click()">📂 Upload CSV File(s)</button>
    <input type="file" id="csvInput" accept=".csv" multiple />
    <div id="uploadStatus">Upload a CSV to get started</div>
  </div>

  <div class="agents-section">
    <label>Agents</label>
    <input id="agentSearch" type="text" placeholder="🔍 Search agent..." oninput="renderAgentList()" />
    <div id="agentList"></div>
  </div>

  <div class="months-section">
    <label>Month (max 3)</label>
    <div class="months-hint">Color-coded by selection order</div>
    <div id="monthsList"></div>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div id="uploadModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:24px;width:370px;box-shadow:0 20px 60px rgba(0,0,0,.2)">
    <h3 style="margin-bottom:16px;color:#1a2744;font-size:16px">⬆️ Name this upload</h3>
    <label style="font-size:12px;font-weight:600;color:#4a5568;display:block;margin-bottom:5px">Agent Name</label>
    <input id="modalAgent" type="text" placeholder="e.g. Donna Rafil" style="width:100%;padding:9px 12px;border:2px solid #e2e8f0;border-radius:6px;font-size:14px;margin-bottom:12px" />
    <label style="font-size:12px;font-weight:600;color:#4a5568;display:block;margin-bottom:5px">Month Label</label>
    <input id="modalMonth" type="text" placeholder="e.g. MAR 2026" style="width:100%;padding:9px 12px;border:2px solid #e2e8f0;border-radius:6px;font-size:14px;margin-bottom:20px" />
    <div style="display:flex;gap:10px">
      <button onclick="cancelUpload()" style="flex:1;padding:10px;border:none;border-radius:7px;background:#e2e8f0;font-size:13px;font-weight:600;cursor:pointer">Cancel</button>
      <button onclick="confirmUpload()" style="flex:1;padding:10px;border:none;border-radius:7px;background:#2d6be4;color:#fff;font-size:13px;font-weight:600;cursor:pointer">Save & Process</button>
    </div>
    <div id="modalStatus" style="margin-top:10px;font-size:12px;display:none;padding:8px;border-radius:6px"></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:24px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div id="confirmMsg" style="font-size:14px;color:#1a2744;margin-bottom:20px;line-height:1.6"></div>
    <div style="display:flex;gap:10px">
      <button onclick="closeConfirm()" style="flex:1;padding:9px;border:none;border-radius:7px;background:#e2e8f0;font-size:13px;font-weight:600;cursor:pointer">Cancel</button>
      <button id="confirmOkBtn" style="flex:1;padding:9px;border:none;border-radius:7px;background:#dc2626;color:#fff;font-size:13px;font-weight:600;cursor:pointer">Delete</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <h1>CS Agent Performance Dashboard</h1>
    <div id="topbarMeta">
      <span id="topbarLabel">No agent selected</span>
      <button id="refreshBtn" onclick="renderDashboard()">🔄 Refresh</button>
    </div>
  </div>
  <div id="content">
    <div id="emptyState">
      <div class="icon">📊</div>
      <h3>Upload a CSV to get started</h3>
      <p>Click "Upload CSV File(s)" → enter agent name & month → view dashboard</p>
    </div>
    <div id="dashboard" style="display:none"></div>
  </div>
</div>

<script>
// ─── STORAGE ─────────────────────────────────────────────────
var DB_KEY = 'cs_perf_db_v2';
var db = { agents: {} };
var selectedAgent = null;
var selectedMonths = [];
var pendingFiles = null;
var confirmCallback = null;

function loadDB() { try { var s = localStorage.getItem(DB_KEY); if (s) db = JSON.parse(s); } catch(e) {} }
function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function listAgents() { return Object.keys(db.agents).sort(); }
function listMonths(a) { return a && db.agents[a] ? Object.keys(db.agents[a]) : []; }
function getMetrics(a, m) { return (db.agents[a] && db.agents[a][m]) || null; }
function setMetrics(a, m, data) { if (!db.agents[a]) db.agents[a]={}; db.agents[a][m]=data; saveDB(); }

// ─── CONFIRM MODAL ───────────────────────────────────────────
function showConfirm(msg, cb) {
  confirmCallback = cb;
  document.getElementById('confirmMsg').innerHTML = msg;
  document.getElementById('confirmModal').style.display = 'flex';
  document.getElementById('confirmOkBtn').onclick = function() { closeConfirm(); cb(); };
}
function closeConfirm() { document.getElementById('confirmModal').style.display = 'none'; confirmCallback = null; }

// ─── CSV UPLOAD ───────────────────────────────────────────────
document.getElementById('csvInput').addEventListener('change', function(e) {
  var files = Array.from(e.target.files);
  if (!files.length) return;
  pendingFiles = files;
  document.getElementById('modalAgent').value = '';
  document.getElementById('modalMonth').value = '';
  document.getElementById('modalStatus').style.display = 'none';
  document.getElementById('uploadModal').style.display = 'flex';
  e.target.value = '';
});

function cancelUpload() { document.getElementById('uploadModal').style.display = 'none'; pendingFiles = null; }

function confirmUpload() {
  var agent = document.getElementById('modalAgent').value.trim();
  var month = document.getElementById('modalMonth').value.trim();
  if (!agent || !month) { showModalStatus('Please fill in both fields.', '#dc2626'); return; }
  showModalStatus('⏳ Processing...', '#2d6be4');
  setTimeout(function() {
    try {
      var reads = pendingFiles.map(function(f) {
        return new Promise(function(resolve) {
          var r = new FileReader();
          r.onload = function(e) { resolve(e.target.result); };
          r.readAsText(f, 'UTF-8');
        });
      });
      Promise.all(reads).then(function(contents) {
        var merged = contents[0];
        for (var i = 1; i < contents.length; i++) {
          var lines = contents[i].split('\n'); lines.shift();
          merged += '\n' + lines.join('\n');
        }
        var rows = parseCSV(merged);
        if (rows.length < 2) { showModalStatus('CSV is empty.', '#dc2626'); return; }
        var headers = rows[0].map(function(h) { return h.replace('Support Ticket Agent Interactions ','').trim(); });
        var metrics = calcMetrics(rows.slice(1), headers, agent, month);
        setMetrics(agent, month, metrics);
        document.getElementById('uploadModal').style.display = 'none';
        pendingFiles = null;
        setStatus('✅ ' + agent + ' · ' + month + ' (' + metrics.tickets + ' tickets)');
        renderAgentList();
        if (selectedAgent === agent) renderMonthList();
        else { selectedAgent = agent; selectedMonths = [month]; renderAgentList(); renderMonthList(); renderDashboard(); }
      });
    } catch(err) { showModalStatus('Error: ' + err.message, '#dc2626'); }
  }, 50);
}

function showModalStatus(msg, color) {
  var el = document.getElementById('modalStatus');
  el.textContent = msg; el.style.color = color; el.style.display = 'block';
}
function setStatus(msg) { document.getElementById('uploadStatus').textContent = msg; }

// ─── CSV PARSER ───────────────────────────────────────────────
function parseCSV(text) {
  var rows=[]; var row=[]; var cell=''; var inQ=false;
  for (var i=0; i<text.length; i++) {
    var c=text[i];
    if (c==='"') { if (inQ&&text[i+1]==='"') { cell+='"'; i++; } else { inQ=!inQ; } }
    else if (c===','&&!inQ) { row.push(cell); cell=''; }
    else if ((c==='\n'||c==='\r')&&!inQ) {
      if (c==='\r'&&text[i+1]==='\n') i++;
      row.push(cell); cell='';
      if (row.some(function(v){return v.trim();})) rows.push(row);
      row=[];
    } else { cell+=c; }
  }
  if (cell||row.length) { row.push(cell); if (row.some(function(v){return v.trim();})) rows.push(row); }
  return rows;
}

// ─── CALC METRICS ────────────────────────────────────────────
function calcMetrics(rows, headers, agentName, label) {
  function ci(n) { return headers.indexOf(n); }
  var C = {
    tid:ci('Ticket ID'), status:ci('Status'), ts:ci('Comment Timestamp'),
    solvedAt:ci('First Solved At'), ht:ci('Handle Time (minutes)'),
    frt:ci('First Reply Time (Minutes)'), fcr:ci('First Contact Resolution (FCR)'),
    csatP:ci('Positive CSAT Ticket Volume'), csatN:ci('Negative CSAT Ticket Volume'),
    reassign:ci('Is Reassignment'), tags:ci('Tags'), reopens:ci('Count Reopens'),
    seg1:ci('Segment 1'), seg2:ci('Segment 2'), seg3:ci('Segment 3'),
    channel:ci('Channel'), lang:ci('Language')
  };

  var seen={}, frtArr=[], htArr=[], resArr=[], dates={};
  var tkStatus={}, tkFirst={}, tkSolved={};
  var frtByHr={}, frtByDow={}, segCount={}, segHT={}, chanMap={}, langMap={}, weekly={};
  var fcrPos=0, fcrTot=0, csatP=0, csatN=0;
  var escalCnt=0, raCnt=0, roCnt=0;

  rows.forEach(function(row) {
    var tid=(C.tid>=0?(row[C.tid]||''):'').trim(); if (!tid) return;
    var tsStr=C.ts>=0?row[C.ts]||'':'';
    var ts=tsStr?new Date(tsStr):null;
    var ok=ts&&!isNaN(ts.getTime());

    if (ok) {
      dates[ts.toDateString()]=true;
      var wk=isoWeek(ts);
      if (!weekly[wk]) weekly[wk]={tids:{},frs:[],hts:[]};
      weekly[wk].tids[tid]=true;
      var fv=parseFloat(C.frt>=0?row[C.frt]:NaN);
      if (!isNaN(fv)&&fv>=0) {
        frtArr.push(fv); weekly[wk].frs.push(fv);
        if (fv>15) { var hr=ts.getHours(); frtByHr[hr]=(frtByHr[hr]||0)+1; frtByDow[ts.getDay()]=(frtByDow[ts.getDay()]||0)+1; }
      }
      var hv=parseFloat(C.ht>=0?row[C.ht]:NaN);
      if (!isNaN(hv)&&hv>=0&&hv<1000) { htArr.push(hv); weekly[wk].hts.push(hv); }
      if (!tkFirst[tid]||ts<tkFirst[tid]) tkFirst[tid]=ts;
    }

    var sv=C.solvedAt>=0&&row[C.solvedAt]?new Date(row[C.solvedAt]):null;
    if (sv&&!isNaN(sv.getTime())&&!tkSolved[tid]) tkSolved[tid]=sv;

    var fcrV=C.fcr>=0?row[C.fcr]:'';
    if (fcrV!=='') { fcrTot++; if (fcrV==='100.00%') fcrPos++; }
    var cp=parseFloat(C.csatP>=0?row[C.csatP]:NaN), cn=parseFloat(C.csatN>=0?row[C.csatN]:NaN);
    if (!isNaN(cp)) csatP+=cp; if (!isNaN(cn)) csatN+=cn;

    if (seen[tid]) return; seen[tid]=true;
    tkStatus[tid]=C.status>=0?row[C.status]:'';

    var s1=(C.seg1>=0?row[C.seg1]||'':'').trim();
    var s2=(C.seg2>=0?row[C.seg2]||'':'').trim();
    var s3=(C.seg3>=0?row[C.seg3]||'':'').trim();
    var seg=[s1,s2,s3].filter(function(s){return s&&s!=='nan';}).join(' › ')||'Unknown';
    segCount[seg]=(segCount[seg]||0)+1;
    if (!segHT[seg]) segHT[seg]=[];
    var htT=parseFloat(C.ht>=0?row[C.ht]:NaN);
    if (!isNaN(htT)&&htT<1000) segHT[seg].push(htT);

    var tgs=(C.tags>=0?row[C.tags]||'':'').toLowerCase();
    if (tgs.indexOf('ultimate_escalation')>=0) escalCnt++;
    var ra=C.reassign>=0?row[C.reassign]:'';
    if (ra==='True'||ra==='true') raCnt++;
    var ro=parseFloat(C.reopens>=0?row[C.reopens]:NaN);
    if (!isNaN(ro)&&ro>=1) roCnt++;

    var ch=C.channel>=0?row[C.channel]||'unknown':'unknown';
    chanMap[ch]=(chanMap[ch]||0)+1;
    var lg=(C.lang>=0?row[C.lang]||'':'').replace('language__','').toUpperCase()||'unknown';
    langMap[lg]=(langMap[lg]||0)+1;
  });

  Object.keys(tkFirst).forEach(function(tid) {
    if (tkSolved[tid]&&tkFirst[tid]) { var h=(tkSolved[tid]-tkFirst[tid])/3600000; if (h>=0) resArr.push(h); }
  });

  var totalTk=Object.keys(seen).length, activeDays=Object.keys(dates).length;
  var closed=Object.keys(tkStatus).filter(function(t){return tkStatus[t]==='closed';}).length;
  var DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var frtDist={'<5':0,'5-15':0,'15-30':0,'30-60':0,'≥60':0};
  frtArr.forEach(function(v){ if (v<5) frtDist['<5']++; else if (v<15) frtDist['5-15']++; else if (v<30) frtDist['15-30']++; else if (v<60) frtDist['30-60']++; else frtDist['≥60']++; });

  var htDist={'<5':0,'5-10':0,'10-20':0,'20-30':0,'≥30':0};
  htArr.forEach(function(v){ if (v<5) htDist['<5']++; else if (v<10) htDist['5-10']++; else if (v<20) htDist['10-20']++; else if (v<30) htDist['20-30']++; else htDist['≥30']++; });

  var frtHourTop=topN(frtByHr,6).map(function(e){return{label:'UTC '+e.k+'h',v:e.v};});
  var frtDowAll=[]; for (var d=0;d<7;d++) if (frtByDow[d]) frtDowAll.push({label:DOW[d],v:frtByDow[d]});
  frtDowAll.sort(function(a,b){return b.v-a.v;});

  var top5seg=Object.keys(segCount).map(function(k){return{name:k,count:segCount[k],pct:totalTk>0?segCount[k]/totalTk*100:0};}).sort(function(a,b){return b.count-a.count;}).slice(0,5);
  var top5ht=Object.keys(segHT).filter(function(k){return segHT[k].length>=2;}).map(function(k){return{name:k,avgHT:mean(segHT[k]),n:segHT[k].length};}).sort(function(a,b){return b.avgHT-a.avgHT;}).slice(0,5);
  var weekly2=Object.keys(weekly).sort().map(function(wk){var d=weekly[wk];return{week:'W'+wk,tickets:Object.keys(d.tids).length,avgFRT:mean(d.frs),avgHT:mean(d.hts)};});

  return {

// ─── MATH ────────────────────────────────────────────────────
function mean(a){if(!a||!a.length)return 0;return a.reduce(function(s,v){return s+v;},0)/a.length;}
function median(a){if(!a||!a.length)return 0;var s=a.slice().sort(function(a,b){return a-b;});var m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function pct(a,p){if(!a||!a.length)return 0;var s=a.slice().sort(function(a,b){return a-b;});return s[Math.ceil(s.length*p/100)-1]||0;}
function f(v,d){if(v===null||v===undefined||isNaN(v))return 'N/A';return parseFloat(v).toFixed(d!==undefined?d:1);}
function topN(o,n){return Object.keys(o).map(function(k){return{k:k,v:o[k]};}).sort(function(a,b){return b.v-a.v;}).slice(0,n);}
function isoWeek(d){var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);var y=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-y)/86400000)+1)/7);}

    html+='<div class="agent-item'+(a===selectedAgent?' active':'')+'" onclick="selectAgent(\''+eq(a)+'\')">' +

      '<span class="del-btn" onclick="event.stopPropagation();delAgent(\''+eq(a)+'\')">🗑️</span></div>';
  });

}

function renderMonthList() {
  var months=listMonths(selectedAgent);
  var cols=['sel-0','sel-1','sel-2'];
  var html='';
  months.forEach(function(m){
    var idx=selectedMonths.indexOf(m);
    html+='<div class="month-row">' +

function eq(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function selectAgent(name){
  selectedAgent=name; selectedMonths=[];
  var m=listMonths(name); if (m.length) selectedMonths=[m[0]];
  renderAgentList(); renderMonthList(); renderDashboard();
}
function toggleMonth(m){
  var idx=selectedMonths.indexOf(m);
  if (idx>=0) selectedMonths.splice(idx,1);
  else if (selectedMonths.length<3) selectedMonths.push(m);
  renderMonthList(); renderDashboard();
}
function delAgent(name){
  showConfirm('Delete all data for <b>"'+name+'"</b>?<br><small style="color:#dc2626">This cannot be undone.</small>', function(){
    delete db.agents[name]; saveDB();
    if (selectedAgent===name){ selectedAgent=null; selectedMonths=[]; document.getElementById('dashboard').style.display='none'; document.getElementById('emptyState').style.display='flex'; document.getElementById('topbarLabel').textContent='No agent selected'; }
    renderAgentList(); setStatus('Deleted: '+name);
  });
}
function delMonth(agent,month){
  showConfirm('Delete <b>"'+month+'"</b> for <b>"'+agent+'"</b>?<br><small style="color:#dc2626">This cannot be undone.</small>', function(){
    if (db.agents[agent]&&db.agents[agent][month]) { delete db.agents[agent][month]; if (!Object.keys(db.agents[agent]).length) delete db.agents[agent]; saveDB(); }
    selectedMonths=selectedMonths.filter(function(m){return m!==month;});
    renderAgentList(); renderMonthList(); renderDashboard(); setStatus('Deleted: '+agent+' · '+month);
  });
}

      '<div style="font-weight:700;font-size:13px;color:'+bc+';margin-bottom:4px">'+ic+' '+iss.title+'</div>'+
      '<div style="font-size:12px;color:#4a5568;line-height:1.6">'+iss.detail+'</div>'+
      '<div style="font-size:12px;color:'+bc+';margin-top:6px;font-weight:600">💡 '+iss.action+'</div></div>';
  });
  html+='</div>';

  document.getElementById('dashboard').innerHTML=html;
  drawChartFRT(m,allM); drawChartWeekly(m,allM);
}

function buildIssues(m){
  var out=[];
  // FRT
  if (m.avgFRT>30) out.push({t:'critical',title:'High Avg FRT ('+f(m.avgFRT,1)+' min)',detail:'Average FRT significantly exceeds the 15-min target. Median is '+f(m.medFRT,1)+' min — extreme outliers are pulling the average up.',action:'Audit tickets with FRT > 60 min. Prioritize queue during peak UTC 14–16h. Set up auto-assignment rules.'});
  else if (m.avgFRT>15) out.push({t:'warn',title:'Avg FRT Above Target ('+f(m.avgFRT,1)+' min)',detail:'Average FRT is above the 15-min benchmark. '+m.frtOver15+' tickets ('+f(m.frtOver15pct,1)+'%) exceeded the threshold.',action:'Review queue management. Alert when tickets wait > 10 min without a reply.'});
  else out.push({t:'ok',title:'FRT On Target ('+f(m.avgFRT,1)+' min)',detail:f(100-m.frtOver15pct,1)+'% of tickets received a first reply within 15 minutes.',action:'Maintain current workflow. Monitor peak-hour performance.'});
  // Handle Time
  if (m.avgHT>20) out.push({t:'critical',title:'High Avg Handle Time ('+f(m.avgHT,1)+' min)',detail:f(m.htOver20pct,1)+'% of interactions ('+m.htOver20+' cases) exceeded 20 minutes. This may indicate complex cases or inefficient resolution processes.',action:'Review the longest handle-time cases. Check if process documentation needs updating for complex segments.'});
  else if (m.htOver20pct>20) out.push({t:'warn',title:'HT > 20 min: '+f(m.htOver20pct,1)+'% of Cases',detail:m.htOver20+' interactions took more than 20 minutes to handle.',action:'Identify top segments with high HT. Strengthen knowledge base and automation for those categories.'});
  // Reopen
  if (m.reopenRate>35) out.push({t:'critical',title:'High Reopen Rate ('+f(m.reopenRate,1)+'%)',detail:'Over a third of tickets were reopened — first-contact resolution is insufficient.',action:'Implement a resolution checklist before closing. Coach on complete troubleshooting.'});
  else if (m.reopenRate>20) out.push({t:'warn',title:'Elevated Reopen Rate ('+f(m.reopenRate,1)+'%)',detail:'Target is below 20%. Tickets are frequently re-opened after closure.',action:'Identify top ticket types being reopened. Strengthen knowledge base for those categories.'});
  else out.push({t:'ok',title:'Reopen Rate Acceptable ('+f(m.reopenRate,1)+'%)',detail:'Most tickets are being resolved on first attempt.',action:'Aim to reduce below 15% for best-in-class performance.'});
  // FCR
  if (m.fcrRate<60) out.push({t:'critical',title:'Low FCR Rate ('+f(m.fcrRate,1)+'%)',detail:'Nearly '+f(100-m.fcrRate,1)+'% of issues require multiple contacts. Industry benchmark is 70–75%.',action:'Identify recurring multi-contact types. Provide targeted training and improve troubleshooting guides.'});
  else if (m.fcrRate<70) out.push({t:'warn',title:'FCR Below Benchmark ('+f(m.fcrRate,1)+'%)',detail:'Below the 70% target. Measured on '+m.fcrN+' interactions.',action:'Focus on lowest-FCR segments. Provide additional resource materials.'});
  else out.push({t:'ok',title:'FCR Meeting Target ('+f(m.fcrRate,1)+'%)',detail:'First Contact Resolution is at or above the 70% benchmark.',action:'Keep knowledge base updated. Aim for 75%+ next month.'});
  // CSAT
  if (m.csatTotal<10) out.push({t:'warn',title:'Low CSAT Response Volume ('+m.csatTotal+' responses)',detail:'Only '+f(m.csatTotal/m.tickets*100,1)+'% of tickets generated CSAT data. Statistically unreliable.',action:'Enable post-resolution surveys. Aim for 15%+ response rate.'});
  else if (m.csatRate<85) out.push({t:'critical',title:'CSAT Below Target ('+f(m.csatRate,1)+'%)',detail:m.csatNeg+' negative vs '+m.csatPos+' positive responses.',action:'Review negative CSAT tickets for root cause. Identify complaint patterns.'});
  else if (m.csatRate<90) out.push({t:'warn',title:'CSAT Needs Improvement ('+f(m.csatRate,1)+'%)',detail:'Target is 90%+. '+m.csatNeg+' negative responses recorded.',action:'Analyze negatives. Improve empathy and resolution completeness in communications.'});
  else out.push({t:'ok',title:'CSAT Excellent ('+f(m.csatRate,1)+'%)',detail:m.csatPos+' positive vs '+m.csatNeg+' negative. Exceeds 90% target.',action:'Share best practices with the wider team.'});
  // Reassignment
  if (m.reassRate>40) out.push({t:'warn',title:'High Reassignment Rate ('+f(m.reassRate,1)+'%)',detail:m.reassCount+' tickets were reassigned to this agent from others.',action:'Analyze reassignment reasons. Review routing logic to reduce unnecessary transfers.'});
  // FRT peak hours
  if (m.frtHourTop&&m.frtHourTop[0]&&m.frtHourTop[0].v>10) out.push({t:'warn',title:'Peak-Hour FRT Delays ('+m.frtHourTop[0].label+' — '+m.frtHourTop[0].v+' cases)',detail:'Most FRT > 15 min cases are concentrated during this UTC window.',action:'Review staffing for this period. Consider load balancing or auto-responses.'});
  var over60=(m.frtDist&&m.frtDist['≥60'])||0;
  if (over60>5) out.push({t:'critical',title:over60+' Tickets With FRT Over 60 Min',detail:f(over60/m.frtN*100,1)+'% of measured interactions had FRT exceeding 1 hour — significant SLA breaches.',action:'Set up real-time alerts for tickets waiting > 30 min. Implement SLA breach escalation rules.'});
  return out;
}

function drawChartFRT(m,allM){
  var ctx=document.getElementById('cFRT'); if (!ctx) return;
  var labels=['<5 min','5-15 min','15-30 min','30-60 min','≥60 min'];
  var keys=['<5','5-15','15-30','30-60','≥60'];
  var colors=['#059669','#2d6be4','#d97706','#dc2626','#7c3aed'];
  var datasets=allM.map(function(m2,i){return{label:m2.label,data:keys.map(function(k){return(m2.frtDist&&m2.frtDist[k])||0;}),backgroundColor:allM.length===1?colors:['#3b82f6','#10b981','#f59e0b'][i]||colors[i]};});
  if (allM.length===1) datasets[0].backgroundColor=colors;
  charts['frt']=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:datasets},options:{responsive:true,plugins:{legend:{display:allM.length>1}},scales:{y:{beginAtZero:true}}}});
}

function drawChartWeekly(m,allM){
  var ctx=document.getElementById('cWeekly'); if (!ctx) return;
  var allWeeks={}; allM.forEach(function(m2){(m2.weekly||[]).forEach(function(w){allWeeks[w.week]=true;});});
  var wkList=Object.keys(allWeeks).sort();
  var mColors=['#2d6be4','#059669','#d97706'];
  var datasets=allM.map(function(m2,i){return{label:m2.label+' FRT',data:wkList.map(function(wk){var found=(m2.weekly||[]).filter(function(w){return w.week===wk;})[0];return found?parseFloat(f(found.avgFRT,1)):null;}),borderColor:mColors[i],backgroundColor:mColors[i]+'22',fill:true,tension:0.3,pointRadius:4};});
  charts['weekly']=new Chart(ctx,{type:'line',data:{labels:wkList,datasets:datasets},options:{responsive:true,plugins:{legend:{display:allM.length>1}},scales:{y:{beginAtZero:true,title:{display:true,text:'Minutes'}}}}});
}

loadDB(); renderAgentList();
